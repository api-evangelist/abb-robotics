aid: abb-robotics
name: ABB Robotics
description: >-
  ABB Robotics is the robotics and discrete-automation business of ABB Ltd, the
  Swiss-Swedish multinational headquartered in Zurich, Switzerland. ABB was
  formed in 1988 from the merger of ASEA (Sweden) and Brown, Boveri & Cie
  (Switzerland), with ASEA's IRB 6 (1974) considered the world's first
  microprocessor-controlled industrial robot. ABB Robotics manufactures a broad
  portfolio of articulated industrial robots, collaborative robots
  (GoFa, SWIFTI, YuMi), delta robots (FlexPicker / IRB 360), painting and
  welding robots, and autonomous mobile robots, paired with the OmniCore family
  of controllers running RobotWare 7 and the RAPID programming language. The
  developer surface is anchored by Robot Web Services (RWS) — a RESTful
  HTTP/HTTPS API for IO, RAPID, motion, file service, controller, e-log,
  subscriptions over WebSockets, and user authentication — plus the PC SDK
  (.NET) for native controller applications and the RobotStudio SDK
  (.NET 10 / RobotStudio 2026) for building Add-Ins and SmartComponents.
  RobotStudio Cloud extends offline programming and simulation into a
  collaborative browser surface. ABB also boosts RobotStudio with NVIDIA
  Omniverse libraries for AI-driven simulation. The company sells robots,
  controllers, software licenses, and PowerPac add-ons; RobotStudio Basic is
  free, RobotStudio Premium is sold by annual subscription via local sales.
