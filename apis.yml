apis:
  - aid: abb-robotics:robot-web-services
    name: ABB Robot Web Services (RWS)
    description: >-
      Robot Web Services is the canonical REST/HTTP(S) API exposed by ABB
      OmniCore (RobotWare 7) and IRC5 controllers. It provides programmatic
      access to RAPID program data and execution, IO signals, motion system,
      file service, e-log, configuration (CFG), controller (clock, restart,
      identification), user authorization, and subscriptions over WebSockets.
      RWS uses digest authentication and supports both XML (default) and JSON
      (HAL) representations via the `json=1` query parameter. Endpoints
      include /rw/rapid, /rw/iosystem, /rw/motionsystem, /rw/system,
      /rw/panel, /rw/elog, /rw/cfg, /fileservice, /subscription, /users,
      and /ctrl.
    humanURL: https://developercenter.robotstudio.com/api/rwsApi/
    tags:
      - Robotics
      - REST
      - Controllers
      - OmniCore
      - RAPID
      - IO
      - Motion
      - Subscriptions
      - WebSockets
    properties:
      - url: https://developercenter.robotstudio.com/api/rwsApi/
        type: Documentation
      - url: https://developercenter.robotstudio.com/api/RWS
        type: Documentation
      - url: https://github.com/ros-industrial/abb_librws
        type: SDK
        name: abb_librws (community C++ client)
      - url: https://abb-robot-client.readthedocs.io/en/stable/abb_robot_client/api/rws.html
        type: SDK
        name: abb_robot_client (community Python client)
  - aid: abb-robotics:robot-web-services-subscriptions
    name: ABB Robot Web Services Subscriptions
    description: >-
      WebSocket-based subscription service that pushes change events for
      subscribed RWS resources (IO signals, RAPID symbols, controller state,
      execution state, e-log, motion system). Clients open a subscription
      group via POST /subscription and then upgrade to a WebSocket
      connection to receive notifications. Critical for low-latency
      controller monitoring, HMIs, and supervisory applications.
    humanURL: https://developercenter.robotstudio.com/api/rwsApi/
    tags:
      - Robotics
      - WebSockets
      - Events
      - Subscriptions
      - Real-Time
    properties:
      - url: https://developercenter.robotstudio.com/api/rwsApi/
        type: Documentation
  - aid: abb-robotics:pc-sdk
    name: ABB PC SDK
    description: >-
      The PC SDK is a .NET software development kit that lets system
      integrators, third parties, and end users build custom PC applications
      and RobotStudio Add-Ins that communicate with an ABB robot controller
      over a network. Domains include Controller, RapidDomain, IOSystemDomain,
      MotionDomain, EventLogDomain, FileSystemDomain, ConfigurationDomain,
      and UserAuthorizationManagement. PC SDK is the recommended path for
      native operator interfaces and complements RWS for richer access
      semantics including mastership.
    humanURL: https://developercenter.robotstudio.com/api/pcsdk/
    tags:
      - Robotics
      - SDK
      - .NET
      - Controllers
      - Operator Interfaces
    properties:
      - url: https://developercenter.robotstudio.com/api/pcsdk/
        type: Documentation
      - url: https://developercenter.robotstudio.com/api/pcsdk/api/index.html
        type: Documentation
        name: PC SDK API Reference
      - url: https://library.e.abb.com/public/124d6b59313ed85fc125793400410c5b/3HAC036957-en.pdf
        type: Documentation
        name: PC SDK Application Manual
  - aid: abb-robotics:robotstudio-sdk
    name: ABB RobotStudio SDK
    description: >-
      The RobotStudio SDK enables developers to build custom applications,
      Add-Ins, and SmartComponents that extend RobotStudio. The current
      version targets RobotStudio 2026 and is built on .NET 10. Used by
      ABB partners and integrators to ship PowerPac-like extensions for
      simulation, offline programming, and workflow automation inside the
      RobotStudio environment.
    humanURL: https://developercenter.robotstudio.com/api/robotstudio/index.html
    tags:
      - Robotics
      - SDK
      - .NET
      - RobotStudio
      - Simulation
      - Offline Programming
    properties:
      - url: https://developercenter.robotstudio.com/api/robotstudio/index.html
        type: Documentation
